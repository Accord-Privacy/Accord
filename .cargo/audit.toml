# cargo-audit configuration
# https://github.com/rustsec/rustsec/tree/main/cargo-audit

[advisories]
# Advisories we've reviewed and accepted the risk for
ignore = [
    # glib 0.18.5: Unsoundness in VariantStrIter (NULL pointer deref)
    # Patched in glib 0.20+ which requires GTK4. Tauri 2.x uses GTK3 (glib 0.18).
    # Tauri GTK4 migration is in progress: https://github.com/tauri-apps/tauri/pull/14684
    # Targeted for Tauri 3.0. We will upgrade immediately when available.
    # Risk: Memory unsoundness in VariantStrIter — we don't directly use this API,
    # but it exists in compiled code via Tauri's GTK3 dependency chain.
    # TRACKING: Check monthly for Tauri 3.0 release with GTK4 support.
    "RUSTSEC-2024-0429",

    # rsa 0.9.10: Marvin Attack (RUSTSEC-2023-0071)
    # Present in Cargo.lock via sqlx-mysql (transitive dep of sqlx 0.8 optional backend)
    # but NOT compiled — we use sqlx with default-features=false, sqlite only.
    # Confirmed: `cargo tree --target all | grep rsa` shows nothing.
    # No attack surface — code never compiled into our binary.
    "RUSTSEC-2023-0071",

    # quick-xml 0.38.x: NsReader memory-exhaustion DoS + quadratic attribute check
    # (RUSTSEC-2026-0195, RUSTSEC-2026-0194). Patched in quick-xml >=0.41, but we
    # are held back by plist 1.8 -> tauri 2.x (macOS .plist parsing only).
    # Not reachable from the relay server; desktop-only, and only on macOS targets,
    # parsing local trusted plists — no attacker-controlled XML flows through it.
    # TRACKING: remove when plist/tauri bump quick-xml to >=0.41.
    "RUSTSEC-2026-0195",
    "RUSTSEC-2026-0194",
]

# Don't fail on unmaintained crates (Tauri's GTK3 bindings — resolves with GTK4 migration)
informational_warnings = ["unmaintained"]
